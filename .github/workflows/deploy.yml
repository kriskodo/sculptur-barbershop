name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -r images dist/

          # Minify the HTML and write it as index.html so GH Pages serves it as the root.
          npx --yes html-minifier-terser@7.2.0 \
            --collapse-whitespace \
            --remove-comments \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --remove-style-link-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js true \
            -o dist/index.html \
            sculptur-barbershop.html

          orig=$(wc -c < sculptur-barbershop.html)
          min=$(wc -c < dist/index.html)
          echo "HTML: $orig -> $min bytes ($(( 100 - 100 * min / orig ))% smaller)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
